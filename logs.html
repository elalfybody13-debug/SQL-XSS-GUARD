<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CyberGuard Audit Logs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body,
        html {
            height: 100%;
            margin: 0;
            background-color: #05080f;
            color: #c9d1d9;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }
        
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        .content-wrapper {
            position: relative;
            z-index: 10;
            padding: 50px 20px;
        }
        
        .card {
            background: rgba(22, 27, 34, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid #30363d;
            border-radius: 12px;
        }
        
        .log-entry {
            font-family: 'Courier New', monospace;
            padding: 12px;
            border-bottom: 1px solid #30363d;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        
        .log-entry:hover {
            background: rgba(88, 166, 255, 0.05);
        }
        
        .text-alarm {
            color: #ff7b72;
            font-weight: bold;
        }
        
        .btn-back {
            color: #58a6ff;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid #58a6ff;
            padding: 8px 20px;
            border-radius: 8px;
            transition: 0.3s;
        }
        
        .btn-back:hover {
            background: #58a6ff;
            color: #fff;
        }
    </style>
</head>

<body>
    <div id="particles-js"></div>
    <div class="content-wrapper container">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h2 style="color: #58a6ff; font-weight: 800;">🛡️ INCIDENT LOGS</h2>
            <a href="/" class="btn-back">← Back to Scanner</a>
        </div>
        <div class="card p-4">
            {% for log in logs %}
            <div class="log-entry">
                {% if 'ALARM' in log %}
                <span class="text-alarm">{{ log }}</span> {% else %} {{ log }} {% endif %}
            </div>
            {% endfor %}
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": {
                    "value": 50
                },
                "color": {
                    "value": "#2ea043"
                },
                "line_linked": {
                    "enable": true,
                    "color": "#58a6ff",
                    "opacity": 0.2
                },
                "move": {
                    "speed": 1
                }
            }
        });
    </script>
</body>

</html>
